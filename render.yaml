services:
  - type: web
    name: n8n-docker
    env: docker
    plan: free

    autoDeploy: true

    envVars:
      - key: N8N_HOST
        value: your-app-name.onrender.com

      - key: N8N_PROTOCOL
        value: https

      - key: WEBHOOK_URL
        value: https://your-app-name.onrender.com/

      - key: N8N_PORT
        value: 5678

      - key: N8N_PROXY_HOPS
        value: 1

      - key: NODE_ENV
        value: production
