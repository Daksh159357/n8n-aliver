services:
  - type: web
    name: n8n-python
    env: python
    plan: free

    buildCommand: |
      apt-get update
      apt-get install -y nodejs npm
      npm install -g n8n

    startCommand: python app.py

    envVars:
      - key: NODE_ENV
        value: production

      - key: N8N_HOST
        value: 0.0.0.0

      - key: N8N_PROTOCOL
        value: https

      - key: N8N_PROXY_HOPS
        value: 1

      # IMPORTANT: do NOT set N8N_PORT here
      # Render will provide PORT automatically
